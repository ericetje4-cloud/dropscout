# Déploiement GitHub Pages — build statique + publication.
# L'app est servie sous https://<user>.github.io/dropscout/, d'où le
# VITE_BASE_PATH=/dropscout/ pour les chemins du manifest et des assets.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # déclenchement manuel possible

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois (annule les runs en cours sur la même branche).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (base path = /dropscout/)
        run: npm run build
        env:
          VITE_BASE_PATH: /dropscout/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
